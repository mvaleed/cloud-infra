---
name: CI/CD

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/**"

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      dev-tf: ${{ steps.filter.outputs.dev-tf }}
      # staging-tf: ${{ steps.filter.outputs.staging-tf }}
      # prod-tf: ${{ steps.filter.outputs.prod-tf }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dev-tf:
              - 'infra/terraform/envs/dev/**'
            # staging-tf:
            #   - 'infra/terraform/envs/staging/**'
            # prod-tf:
            #   - 'infra/terraform/envs/prod/**'

  # PR: plan only
  dev-plan:
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.dev-tf == 'true'
    uses: ./.github/workflows/terraform.yml
    with:
      environment: dev
      action: plan
    secrets:
      TF_VAR_DB_MASTER_PASSWORD: ${{ secrets.TF_VAR_DB_MASTER_PASSWORD }}

  # Push: apply infra + k8s resources (all managed by Terraform)
  dev-apply:
    needs: detect-changes
    if: github.event_name == 'push' && needs.detect-changes.outputs.dev-tf == 'true'
    uses: ./.github/workflows/terraform.yml
    with:
      environment: dev
      action: apply
    secrets:
      TF_VAR_DB_MASTER_PASSWORD: ${{ secrets.TF_VAR_DB_MASTER_PASSWORD }}

  # staging-plan:
  #   needs: detect-changes
  #   if: github.event_name == 'pull_request' && needs.detect-changes.outputs.staging-tf == 'true'
  #   uses: ./.github/workflows/terraform.yml
  #   with:
  #     environment: staging
  #     action: plan
  #   secrets:
  #     TF_VAR_DB_MASTER_PASSWORD: ${{ secrets.TF_VAR_DB_MASTER_PASSWORD }}

  # staging-apply:
  #   needs: [detect-changes, dev-apply]
  #   if: >-
  #     always()
  #     && github.event_name == 'push'
  #     && needs.detect-changes.outputs.staging-tf == 'true'
  #     && (needs.dev-apply.result == 'success' || needs.dev-apply.result == 'skipped')
  #   uses: ./.github/workflows/terraform.yml
  #   with:
  #     environment: staging
  #     action: apply
  #   secrets:
  #     TF_VAR_DB_MASTER_PASSWORD: ${{ secrets.TF_VAR_DB_MASTER_PASSWORD }}

