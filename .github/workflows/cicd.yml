---
# ──────────────────────────────────────────────────────────────────
# CI/CD Orchestrator
# ──────────────────────────────────────────────────────────────────
# Single entry point for all infrastructure changes.
# Detects which environments changed, then calls the reusable
# Terraform and Kubernetes workflows in the correct order.
#
# PR:   terraform plan for each changed env
# Push: terraform apply → k8s deploy, sequentially: dev → staging → prod
# ──────────────────────────────────────────────────────────────────
name: CI/CD

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/**"

permissions:
  id-token: write
  contents: read

jobs:
  # ════════════════════════════════════════════════════════════════
  # Detect which environments have changes
  # ════════════════════════════════════════════════════════════════
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      dev-tf: ${{ steps.filter.outputs.dev-tf }}
      dev-k8s: ${{ steps.filter.outputs.dev-k8s }}
      # staging-tf: ${{ steps.filter.outputs.staging-tf }}
      # staging-k8s: ${{ steps.filter.outputs.staging-k8s }}
      # prod-tf: ${{ steps.filter.outputs.prod-tf }}
      # prod-k8s: ${{ steps.filter.outputs.prod-k8s }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dev-tf:
              - 'infra/terraform/envs/dev/**'
            dev-k8s:
              - 'infra/k8s/**'
            # staging-tf:
            #   - 'infra/terraform/envs/staging/**'
            # staging-k8s:
            #   - 'infra/k8s/**'
            # prod-tf:
            #   - 'infra/terraform/envs/prod/**'
            # prod-k8s:
            #   - 'infra/k8s/**'

  # ════════════════════════════════════════════════════════════════
  # DEV
  # ════════════════════════════════════════════════════════════════

  # ── PR: plan only ──────────────────────────────────────────────
  dev-plan:
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.dev-tf == 'true'
    uses: ./.github/workflows/terraform.yml
    with:
      environment: dev
      action: plan
    secrets:
      TF_VAR_DB_MASTER_PASSWORD: ${{ secrets.TF_VAR_DB_MASTER_PASSWORD }}

  # ── Push: apply infra, then deploy k8s ─────────────────────────
  dev-apply:
    needs: detect-changes
    if: github.event_name == 'push' && needs.detect-changes.outputs.dev-tf == 'true'
    uses: ./.github/workflows/terraform.yml
    with:
      environment: dev
      action: apply
    secrets:
      TF_VAR_DB_MASTER_PASSWORD: ${{ secrets.TF_VAR_DB_MASTER_PASSWORD }}

  dev-k8s:
    needs: [detect-changes, dev-apply]
    # Run if TF was applied (k8s always needs fresh outputs after TF changes)
    # OR if only k8s manifests changed (TF apply was skipped)
    if: |
      always()
      && github.event_name == 'push'
      && needs.detect-changes.result == 'success'
      && (needs.dev-apply.result == 'success' || needs.dev-apply.result == 'skipped')
      && (needs.detect-changes.outputs.dev-tf == 'true' || needs.detect-changes.outputs.dev-k8s == 'true')
    uses: ./.github/workflows/k8s.yml
    with:
      environment: dev
    secrets:
      TF_VAR_DB_MASTER_PASSWORD: ${{ secrets.TF_VAR_DB_MASTER_PASSWORD }}

  # ════════════════════════════════════════════════════════════════
