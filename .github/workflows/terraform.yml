---
# ──────────────────────────────────────────────────────────────────
# Reusable Terraform Workflow
# ──────────────────────────────────────────────────────────────────
# Called by cicd.yml or triggered manually via GitHub UI.
# Runs plan or apply for a single environment.
# ──────────────────────────────────────────────────────────────────
name: Terraform

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (dev, staging, prod)"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      action:
        description: "plan or apply"
        required: true
        type: choice
        options:
          - plan
          - apply
  workflow_call:
    inputs:
      environment:
        description: "Target environment (dev, staging, prod)"
        required: true
        type: string
      action:
        description: "plan or apply"
        required: true
        type: string
    secrets:
      TF_VAR_DB_MASTER_PASSWORD:
        required: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.14.6"

jobs:
  plan:
    if: inputs.action == 'plan'
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-plan-${{ inputs.environment }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials (Plan — Read Only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::129580962636:role/github-actions-terraform-plan-role
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: tf-plan-${{ inputs.environment }}-${{ github.run_id }}

      - name: Terraform Init
        working-directory: infra/terraform/envs/${{ inputs.environment }}
        run: terraform init -input=false

      - name: Terraform Format Check
        working-directory: infra/terraform/envs/${{ inputs.environment }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: infra/terraform/envs/${{ inputs.environment }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: infra/terraform/envs/${{ inputs.environment }}
        env:
          TF_VAR_db_master_password: ${{ secrets.TF_VAR_DB_MASTER_PASSWORD }}
        run: |
          set -o pipefail
          terraform plan -no-color -input=false -lock-timeout=60s -out=plan.tfplan 2>&1 | tee plan.txt

          echo "### Terraform Plan: \`${{ inputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo '<details><summary>Click to expand</summary>' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY
          head -c 1000000 plan.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '</details>' >> $GITHUB_STEP_SUMMARY

  apply:
    if: inputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: terraform-apply-${{ inputs.environment }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials (Apply — Read/Write)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::129580962636:role/github-actions-terraform-apply-role
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: tf-apply-${{ inputs.environment }}-${{ github.run_id }}

      - name: Terraform Init
        working-directory: infra/terraform/envs/${{ inputs.environment }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: infra/terraform/envs/${{ inputs.environment }}
        run: terraform validate

      - name: Terraform Apply
        working-directory: infra/terraform/envs/${{ inputs.environment }}
        env:
          TF_VAR_db_master_password: ${{ secrets.TF_VAR_DB_MASTER_PASSWORD }}
        run: |
          set -o pipefail
          terraform plan -no-color -input=false -lock-timeout=60s -out=plan.tfplan 2>&1 | tee plan.txt
          terraform apply -input=false plan.tfplan

          echo "### Terraform Apply: \`${{ inputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo '<details><summary>Plan that was applied</summary>' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY
          head -c 1000000 plan.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '</details>' >> $GITHUB_STEP_SUMMARY
